
<html>
<head>
    <meta charset="UTF-8">
    <title>QG de Segurança</title>
    <style>
        body { font-family: monospace; background: #0a0f0d; color: #33ff33; padding: 20px; }
        .painel { max-width: 500px; margin: auto; background: #111a16; border: 2px solid #33ff33; padding: 20px; }
        .botoes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn { text-align: center; padding: 10px; color: #000; font-weight: bold; text-decoration: none; border-radius: 3px; }
        .pm { background: #3399ff; } .bombeiro { background: #ff3333; } .samu { background: #ff9933; }
        #terminal { background: #050806; border: 1px solid #1f4d1f; height: 200px; padding: 10px; overflow-y: auto; margin-bottom: 15px; }
        .linha { margin: 5px 0; }
        .input-area { display: flex; gap: 10px; }
        #txt { flex: 1; background: #050806; border: 1px solid #33ff33; color: #33ff33; padding: 10px; outline: none; }
        .btn-send { background: #33ff33; color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="painel">
        <h2 style="text-align:center;margin-top:0;">[ PAINEL DE CONTROLE ]</h2>
        
        <div class="botoes">
            <a href="tel:190" class="btn pm">PM 190</a>
            <a href="tel:193" class="btn bombeiro">CBM 193</a>
            <a href="tel:192" class="btn samu">SAMU 192</a>
        </div>

        <div id="terminal">
            <div>&gt; SISTEMA ONLINE. DIGITE SUA EMERGÊNCIA ABAIXO.</div>
        </div>

        <form class="input-area" onsubmit="enviarMsg(event)">
            <input type="text" id="txt" placeholder="Ex: tomei um tiro..." required autocomplete="off">
            <button type="submit" class="btn-send">ENTER</button>
        </form>
    </div>

    <script>
        function enviarMsg(e) {
            e.preventDefault();
            const input = document.getElementById('txt');
            const term = document.getElementById('terminal');
            const t = input.value.trim().toLowerCase();

            term.innerHTML += `<div style="color:#888;">&gt; Você: "${input.value}"</div>`;

            if (t.includes("quero roubar") || t.includes("vou bater") || t.includes("quero matar")) {
                term.innerHTML += `<div style="color:#ff3333;font-weight:bold;">[🚨 BLOQUEIO] ATOS ILEGAIS DETECTADOS. VOCÊ PODE SER PRESO!</div>`;
                input.disabled = true;
                return;
            }

            let titulo = "🤖 ANÁLISE:", como = "Mantenha a calma.", onde = "Procure abrigo seguro.", porque = "Evite riscos.";

            // 1. TIRO / ARMA DE FOGO
            if (t.includes("tiro") || t.includes("baleado") || t.includes("arma")) {
                titulo = "🚨 ALERTA: ARMA DE FOGO";
                como = "Pressione um pano limpo no ferimento para estancar o sangue. Ligue 192/190.";
                onde = "Deite no chão e esconda-se atrás de paredes grossas.";
                porque = "Movimentar-se te expõe ao atirador. Controlar o sangue salva sua vida.";
            } 
            // 2. PARADA CARDÍACA / MORTE
            else if (t.includes("morrer") || t.includes("morreu") || t.includes("parada")) {
                titulo = "🚑 ALERTA: EMERGÊNCIA MÉDICA";
                como = "Ligue para o SAMU (192) no viva-voz e faça massagem cardíaca se souber.";
                onde = "Deite a vítima de costas em um chão reto e plano.";
                porque = "O cérebro não pode ficar sem oxigênio até a ambulância chegar.";
            } 
            // 3. INCÊNDIO / FUMAÇA
            else if (t.includes("fumaça") || t.includes("incendio") || t.includes("fogo")) {
                titulo = "🚒 ALERTA: INCÊNDIO";
                como = "Saia correndo. Se tiver fumaça, ande agachado perto do chão. Ligue 193.";
                onde = "Vá para a calçada da rua, longe do fogo e de fios.";
                porque = "A fumaça tóxica sobe e asfixia mais rápido do que o fogo queima.";
            } 
            // 4. VAZAMENTO DE GÁS (Nova inserção)
            else if (t.includes("gas") || t.includes("gás") || t.includes("vazamento") || t.includes("botijao") || t.includes("botijão")) {
                titulo = "💨 ALERTA: VAZAMENTO DE GÁS";
                como = "Abra portas e janelas. NÃO acenda luzes, interruptores, fósforos ou celular. Ligue 193 de um local seguro.";
                onde = "Saia imediatamente do ambiente fechado e vá para a rua.";
                porque = "Uma única faísca elétrica ou de celular pode causar uma grande explosão se o ar estiver saturado de gás.";
            }
            // 5. DESAPARECIMENTO
            else if (t.includes("sumiu") || t.includes("desapareceu")) {
                titulo = "🚔 ALERTA: DESAPARECIMENTO";
                como = "Pegue fotos e roupas da pessoa e ligue para a Polícia (190) na hora.";
                onde = "Procure em caminhos comuns ou hospitais do bairro.";
                porque = "As primeiras horas são as mais importantes para achar pistas.";
            } 
            // 6. ROUBO / ASSALTO 
            else if (t.includes("assalto") || t.includes("roubaram") || t.includes("fui roubado") || t.includes("ladrao")) {
                titulo = "📱 ALERTA: ASSALTO / ROUBO";
                como = "Não reaja, não faça movimentos bruscos e entregue os pertences. Ligue 190 depois.";
                onde = "Fique em local público movimentado após o ocorrido.";
                porque = "Bens materiais se recuperam, a vida não. Reações aumentam a violência.";
            } 
            // 7. ACIDENTE DE TRÂNSITO
            else if (t.includes("batida") || t.includes("acidente") || t.includes("carro") || t.includes("moto")) {
                titulo = "🚗 ALERTA: ACIDENTE DE TRÂNSITO";
                como = "Ligue o pisca-alerta, sinalize a pista com o triângulo e ligue 193 ou 192.";
                onde = "Fique no acostamento, nunca no meio da pista de rolamento.";
                porque = "Evita novos acidentes e atropelamentos no local da batida.";
            } 
            // 8. INFARTO / DOR NO PEITO
            else if (t.includes("infarto") || t.includes("dor no peito") || t.includes("coracao")) {
                titulo = "💓 ALERTA: SUSPEITA DE INFARTO";
                como = "Ligue 192 imediatamente. Afrouxe as roupas da pessoa e deixe-a sentada.";
                onde = "Mantenha a pessoa em um ambiente fresco e ventilado.";
                porque = "O socorro rápido nas primeiras horas evita sequelas graves no coração.";
            } 
            // 9. ENGASGO
            else if (t.includes("engasgou") || t.includes("engasgo") || t.includes("sufocando")) {
                titulo = "🍼 ALERTA: ENGASGAMENTO";
                como = "Faça a Manobra de Heimlich (abraços por trás apertando a boca do estômago).";
                onde = "Posicione-se logo atrás da vítima em pé ou de joelhos.";
                porque = "A pressão no abdômen força o ar dos pulmões a expulsar o objeto.";
            } 
            // 10. ALAGAMENTO / DESABAMENTO
            else if (t.includes("enchente") || t.includes("alagou") || t.includes("desabou") || t.includes("chuva")) {
                titulo = "🌧️ ALERTA: DESASTRE NATURAL";
                como = "Suba para os pontos mais altos. Não atravesse áreas alagadas. Ligue 199 (Defesa Civil).";
                onde = "Longe de encostas de morros, postes e fiações elétricas.";
                porque = "A força da água arrasta carros facilmente e o solo encharcado pode ceder.";
            } 
            // 11. VIOLÊNCIA DOMÉSTICA / AGRESSÃO
            else if (t.includes("apanhando") || t.includes("agressao") || t.includes("bateram") || t.includes("violencia")) {
                titulo = "💜 ALERTA: VIOLÊNCIA / AGRESSÃO";
                como = "Ligue imediatamente para a Polícia (190) ou disque 180 (Central da Mulher).";
                onde = "Procure a delegacia mais próxima ou uma casa de vizinhos seguros.";
                porque = "Denunciar e se afastar do agressor quebra o ciclo de violência física.";
            } 
            // 12. AGRADECIMENTOS
            else if (t.includes("obrigado") || t.includes("obrigada") || t.includes("valeu")) {
                titulo = "🤖 SISTEMA:";
                como = "De nada! Fico feliz em ajudar na sua lição de casa.";
                onde = "Mantenha o painel ativo.";
                porque = "Estar preparado salva vidas.";
            }

            term.innerHTML += `
                <div style="margin-top:10px;border-top:1px dashed #33ff33;padding-top:5px;">
                    <b style="color:#ff9933;">${titulo}</b><br>
                    <div class="linha"><b>COMO:</b> ${como}</div>
                    <div class="linha"><b>ONDE:</b> ${onde}</div>
                    <div class="linha"><b>PORQUE:</b> ${porque}</div>
                </div>`;

            input.value = "";
            term.scrollTop = term.scrollHeight;
        }
    </script>

</body>
</html>
